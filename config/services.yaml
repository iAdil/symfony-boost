services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Core Services
    IAdil\SymfonyBoostBundle\Service\LogReader:
        arguments:
            $logsDir: '%kernel.logs_dir%'
            $environment: '%kernel.environment%'

    IAdil\SymfonyBoostBundle\Service\PackageDiscovery:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Service\BrowserLogger: ~

    # MCP Tools
    IAdil\SymfonyBoostBundle\Mcp\Tool\ApplicationInfoTool:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Mcp\Tool\BrowserLogsTool:
        arguments:
            $logsDir: '%kernel.logs_dir%'

    IAdil\SymfonyBoostBundle\Mcp\Tool\DatabaseConnectionsTool: ~
    IAdil\SymfonyBoostBundle\Mcp\Tool\DatabaseQueryTool: ~
    IAdil\SymfonyBoostBundle\Mcp\Tool\DatabaseSchemaTool: ~
    IAdil\SymfonyBoostBundle\Mcp\Tool\GetAbsoluteUrlTool: ~
    IAdil\SymfonyBoostBundle\Mcp\Tool\LastErrorTool: ~
    IAdil\SymfonyBoostBundle\Mcp\Tool\ReadLogEntriesTool: ~

    IAdil\SymfonyBoostBundle\Mcp\Tool\SearchDocsTool:
        arguments:
            $apiUrl: '%iadil_symfony_boost.hosted.api_url%'

    # MCP Prompts
    IAdil\SymfonyBoostBundle\Mcp\Prompt\SymfonyCodeSimplifierPrompt: ~
    IAdil\SymfonyBoostBundle\Mcp\Prompt\UpgradeSymfony8Prompt: ~
    IAdil\SymfonyBoostBundle\Mcp\Prompt\UpgradeTwigPrompt: ~
    IAdil\SymfonyBoostBundle\Mcp\Prompt\UpgradeDoctrinePrompt: ~

    # MCP Resource
    IAdil\SymfonyBoostBundle\Mcp\Resource\ApplicationInfoResource:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Database Schema
    IAdil\SymfonyBoostBundle\Mcp\DatabaseSchema\SchemaDriverFactory: ~

    # Event Listener
    IAdil\SymfonyBoostBundle\EventListener\InjectBrowserLoggerListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response, priority: -128 }

    # Controller
    IAdil\SymfonyBoostBundle\Controller\BrowserLogController:
        tags: ['controller.service_arguments']

    # Console Commands
    IAdil\SymfonyBoostBundle\Console\StartCommand:
        tags: ['console.command']

    IAdil\SymfonyBoostBundle\Console\InstallCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['console.command']

    IAdil\SymfonyBoostBundle\Console\UpdateCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['console.command']

    IAdil\SymfonyBoostBundle\Console\AddSkillCommand:
        arguments:
            $projectDir: '%kernel.project_dir%'
        tags: ['console.command']

    # Install Services
    IAdil\SymfonyBoostBundle\Install\AgentsDetector:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Install\GuidelineAssist:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Install\GuidelineComposer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Install\GuidelineWriter: ~

    IAdil\SymfonyBoostBundle\Install\SkillComposer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Install\SkillWriter: ~

    IAdil\SymfonyBoostBundle\Install\McpWriter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Support
    IAdil\SymfonyBoostBundle\Support\Config:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Support\Composer:
        arguments:
            $projectDir: '%kernel.project_dir%'

    IAdil\SymfonyBoostBundle\Support\Npm:
        arguments:
            $projectDir: '%kernel.project_dir%'

    # Skills Remote
    IAdil\SymfonyBoostBundle\Skills\Remote\GitHubSkillProvider: ~
    IAdil\SymfonyBoostBundle\Skills\Remote\SkillAuditor: ~
